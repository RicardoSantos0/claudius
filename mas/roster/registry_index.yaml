capability_vocabulary:
  tenacity-retry:
    description: 'Retry logic using the tenacity library. IMPORTANT: tenacity v9+ removed wait_callable().
      Use wait_base subclasses or wait_fixed/wait_exponential. Do not use wait_callable().

      '
  http-pagination:
    description: Iterating multi-page HTTP responses (cursor-based or offset-based).
  atomic-write:
    description: Write to staging path first, swap to final on success; rollback staging on failure.
  argparse-cli:
    description: 'CLI built with Python argparse (NOT Click). Test pattern: main([''subcommand'', ''--arg'',
      ''val'']) or parser.parse_args([...]). Do NOT use Click''s CliRunner — it is Click-specific only.

      '
  click-cli:
    description: 'CLI built with Click. Test pattern: CliRunner().invoke(command, [...]). Distinct from
      argparse-cli.

      '
